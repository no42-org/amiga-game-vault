name: Release

on:
  push:
    tags: ["v*"]

# Least-privilege default; each job widens only what it needs.
permissions:
  contents: read

jobs:
  release:
    name: Build & Release (${{ matrix.target_name }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # create the GitHub release + upload assets
      id-token: write # keyless cosign signing (Fulcio/Rekor OIDC)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target_name: linux-x86_64
          - os: ubuntu-24.04-arm
            target_name: linux-arm64
          - os: macos-latest
            target_name: macos-arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build & test
        run: make verify

      - name: Package
        id: pkg
        run: |
          asset="amiga-disk-vault-${{ github.ref_name }}-${{ matrix.target_name }}.tar.gz"
          tar -czf "$asset" -C target/release amiga-disk-vault
          echo "asset=$asset" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless sign-blob: a bundle carries the signature, the Fulcio cert, and the
      # Rekor transparency-log entry — verifiable with `cosign verify-blob --bundle`.
      - name: Sign the release tarball (keyless)
        env:
          ASSET: ${{ steps.pkg.outputs.asset }}
        run: cosign sign-blob --yes --bundle "${ASSET}.cosign.bundle" "${ASSET}"

      - name: Publish release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          files: |
            ${{ steps.pkg.outputs.asset }}
            ${{ steps.pkg.outputs.asset }}.cosign.bundle
          generate_release_notes: true

  # Publish a multi-arch (amd64 + arm64) image only after the release build/tests
  # pass. The buildx builder, QEMU and manifest plumbing come from the docker
  # actions, so none of that logic lives in the Makefile.
  image:
    name: Publish container image
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing (Fulcio/Rekor OIDC)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and labels
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/no42-org/amiga-disk-vault
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push (amd64 + arm64)
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Sign the multi-arch manifest by immutable digest (not tag); the :version and
      # :latest tags resolve to this digest, so tag-based verification works too.
      - name: Sign the image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "ghcr.io/no42-org/amiga-disk-vault@${DIGEST}"
