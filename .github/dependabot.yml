version: 2
updates:
  # Keep GitHub Actions SHA pins (with their semver comments) current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # Keep Cargo dependencies current.
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: build
