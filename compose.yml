services:
  vault:
    build: .
    image: amiga-game-vault:latest
    container_name: amiga-game-vault
    # Default port 4500 ("A500" in leet). The app has NO authentication and this
    # binds to all interfaces for LAN use. Override the host port to avoid a clash:
    # VAULT_HOST_PORT=4501 docker compose up -d. For host-local only, front it with
    # a reverse proxy (or map "127.0.0.1:${VAULT_HOST_PORT:-4500}:4500").
    ports:
      - "${VAULT_HOST_PORT:-4500}:4500"
    environment:
      VAULT_ADDR: "0.0.0.0:4500"
      VAULT_DATA: "/data"
    volumes:
      - vault-data:/data
    restart: unless-stopped

volumes:
  vault-data:
